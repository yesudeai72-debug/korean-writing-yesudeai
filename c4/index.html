<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4과 - c4</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR",
          sans-serif;
        background: linear-gradient(135deg, #fff8ef, #f6efe4);
        color: #1f1a17;
      }

      main {
        width: min(680px, 100%);
        padding: 44px 30px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 48px rgba(70, 45, 28, 0.12);
        text-align: center;
        border: 1px solid rgba(31, 26, 23, 0.08);
        backdrop-filter: blur(12px);
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(2.1rem, 5vw, 3.4rem);
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        font-size: 1.02rem;
        line-height: 1.7;
        color: #6a5f57;
      }

      p + p {
        margin-top: 18px;
      }

      a {
        color: #d96c3d;
        text-decoration: none;
        font-weight: 600;
      }
    </style>

    <main>
      <h1>4과</h1>
      <p>이 페이지는 c4 학습 내용이 들어갈 자리입니다.</p>
