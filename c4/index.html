<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>4과 - c4</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <style>
      @keyframes strongPulse {
        0% {
          transform: scale(0.97);
          opacity: 0.82;
        }

        100% {
          transform: scale(1.18);
          opacity: 0;
        }
      }

      @keyframes lift {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-3px);
        }
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR",
          sans-serif;
        background: linear-gradient(135deg, #fff8ef, #f6efe4);
        color: #1f1a17;
      }

      main {
        width: min(680px, 100%);
        padding: 44px 30px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.88);
        box-shadow: 0 18px 48px rgba(70, 45, 28, 0.12);
        text-align: center;
        border: 1px solid rgba(31, 26, 23, 0.08);
        backdrop-filter: blur(12px);
      }

      h1 {
        margin: 0 0 14px;
        font-size: clamp(2.1rem, 5vw, 3.4rem);
        font-weight: 800;
        letter-spacing: -0.04em;
      }

      p {
        margin: 0;
        font-size: 1.02rem;
        line-height: 1.7;
        color: #6a5f57;
      }

      p + p {
        margin-top: 18px;
      }

      a {
        color: #d96c3d;
        text-decoration: none;
        font-weight: 600;
      }

      .sample-box {
        margin: 18px 0 0;
        padding: 14px;
        border-radius: 20px;
        background: #f8fafc;
        border: 1px solid rgba(31, 26, 23, 0.08);
      }

      .sample-box strong {
        display: block;
        margin-bottom: 10px;
        color: #203247;
      }

      .sample-line {
        display: flex;
        flex-wrap: wrap;
        gap: 8px 10px;
        align-items: end;
      }

      .sample-chip {
        display: inline-flex;
        padding: 8px 11px;
        border-radius: 999px;
        background: white;
        border: 1px solid #dbe5ee;
        color: #203247;
        font-weight: 700;
      }

      .focus-link {
        position: relative;
        display: inline-flex;
        margin-top: 18px;
        min-height: 52px;
        padding: 0 20px;
        border-radius: 999px;
        align-items: center;
        justify-content: center;
        background: #d96c3d;
        color: white;
        text-decoration: none;
        box-shadow: 0 18px 34px rgba(217, 108, 61, 0.26);
        animation: lift 1.4s ease-in-out infinite;
      }

      .focus-link::before,
      .focus-link::after {
        content: "";
        position: absolute;
        inset: -10px;
        border-radius: 999px;
        border: 3px solid rgba(217, 108, 61, 0.3);
        animation: strongPulse 1.85s ease-out infinite;
      }

      .focus-link::after {
        animation-delay: 0.92s;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>4과</h1>
      <p>이 페이지는 c4 학습 내용이 들어갈 자리입니다.</p>
      <div class="sample-box">
        <strong>맛보기 문제</strong>
        <div class="sample-line">
          <span class="sample-chip">마음</span>
          <span class="sample-chip">이</span>
          <span class="sample-chip">두근두근</span>
          <span class="sample-chip">뛰다</span>
        </div>
      </div>
      <p><a class="focus-link" href="../index.html">다른 학습으로 이동하기</a></p>
    </main>
  </body>
</html>
