<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문장을 만들어요</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <main class="page">
      <section class="hero">
        <span class="eyebrow">Mobile First Korean Tool</span>
        <h1>문장을 만들어요</h1>
        <p class="lead">
          외국인 학습자가 서술어를 중심으로 논항 수와 조사를 함께 보며
          문장을 구성하는 연습을 할 수 있도록 만든 화면입니다.
        </p>
        <div class="level-grid">
          <a class="level-card" href="./beginner/index.html">
            <span class="level-name">초급</span>
            <span class="level-desc">
              기초어휘 1, 2단계를 기준으로 짧은 문장과 기본 논항 구조를 먼저
              익힙니다.
            </span>
            <span class="level-badge">샘플 20개 서술어</span>
          </a>
          <a class="level-card" href="./intermediate/index.html">
            <span class="level-name">중급</span>
            <span class="level-desc">
              기초어휘 3, 4단계에서 논항 관계가 조금 더 복잡한 서술어를 연습합니다.
            </span>
            <span class="level-badge">샘플 20개 서술어</span>
          </a>
          <a class="level-card" href="./advanced/index.html">
            <span class="level-name">고급</span>
            <span class="level-desc">
              실험 대상인 고급 학습자를 위해 서술어 중심 문장 구성을 집중적으로
              다룹니다.
            </span>
            <span class="level-badge">샘플 20개 서술어</span>
          </a>
        </div>
      </section>
    </main>
  </body>
</html>
