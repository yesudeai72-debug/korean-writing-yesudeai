<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>문장을 만들어요 - 문장 연결</title>
    <link rel="stylesheet" href="../styles.css" />
  </head>
  <body>
    <main class="page">
      <div class="topbar">
        <a class="back-link" href="../index.html">학습 모듈로</a>
        <span class="stage-chip">문장 연결</span>
      </div>
      <section class="hero">
        <span class="eyebrow">Independent Learning</span>
        <h1>문장 연결</h1>
        <p class="lead">
          이유, 순서, 대조, 결과 같은 연결 표현을 따로 연습해 긴 문장을
          구성하도록 돕는 모듈입니다.
        </p>
      </section>
      <section class="panel" style="margin-top:14px">
        <h2>준비된 학습 틀</h2>
        <div class="hint-list">
          <div class="hint-item"><strong>학습 초점</strong> 연결어미와 연결 표현의 의미 차이</div>
          <div class="hint-item"><strong>화면 원칙</strong> 한 번에 한 연결 기능만 보여 주는 짧은 연습 흐름</div>
          <div class="hint-item"><strong>다음 단계</strong> 문장 순서 배열과 연결어 선택 과제로 확장</div>
        </div>
      </section>
    </main>
  </body>
</html>
