<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한국어 학습 페이지</title>
    <style>
      :root {
        color-scheme: light;
        --bg-start: #fff8ef;
        --bg-end: #f6efe4;
        --text-main: #1f1a17;
        --text-muted: #6a5f57;
        --card-bg: rgba(255, 255, 255, 0.8);
        --accent: #d96c3d;
        --accent-soft: #ffe2d3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Georgia", "Times New Roman", serif;
        color: var(--text-main);
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.95), transparent 35%),
          linear-gradient(135deg, var(--bg-start), var(--bg-end));
      }

      main {
        width: min(680px, 100%);
        padding: 48px 32px;
        border-radius: 28px;
        background: var(--card-bg);
        border: 1px solid rgba(31, 26, 23, 0.08);
        box-shadow: 0 20px 60px rgba(70, 45, 28, 0.12);
        text-align: center;
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 16px;
        padding: 8px 14px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.85rem;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2.4rem, 6vw, 4.5rem);
        line-height: 0.98;
      }

      p {
        margin: 0 auto;
        max-width: 34rem;
        font-size: 1.1rem;
        line-height: 1.7;
        color: var(--text-muted);
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Korean Learning</div>
      <h1>환영합니다</h1>
      <p>
        이곳은 한국어를 쉽고 즐겁게 배우기 위한 학습 페이지입니다.
        천천히 읽고, 따라 쓰고, 자주 말하면서 한국어와 더 가까워져 보세요.
      </p>
    </main>
  </body>
</html>
