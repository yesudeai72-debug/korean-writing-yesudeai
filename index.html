<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>한국어 학습 페이지</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <style>
      :root {
        color-scheme: light;
        --bg-start: #fff8ef;
        --bg-end: #f6efe4;
        --text-main: #1f1a17;
        --text-muted: #6a5f57;
        --card-bg: rgba(255, 255, 255, 0.8);
        --accent: #d96c3d;
        --accent-soft: #ffe2d3;
        --line-soft: rgba(31, 26, 23, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR",
          sans-serif;
        color: var(--text-main);
        background:
          radial-gradient(circle at top, rgba(255, 255, 255, 0.95), transparent 35%),
          linear-gradient(135deg, var(--bg-start), var(--bg-end));
      }

      main {
        width: min(680px, 100%);
        padding: 52px 36px;
        border-radius: 30px;
        background: var(--card-bg);
        border: 1px solid var(--line-soft);
        box-shadow: 0 20px 60px rgba(70, 45, 28, 0.12);
        text-align: center;
        backdrop-filter: blur(14px);
      }

      .eyebrow {
        display: inline-block;
        margin-bottom: 18px;
        padding: 8px 14px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent);
        font-size: 0.78rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      h1 {
        margin: 0 0 18px;
        font-size: clamp(2.5rem, 6vw, 4.3rem);
        font-weight: 800;
        letter-spacing: -0.05em;
        line-height: 1.02;
      }

      p {
        margin: 0 auto;
        max-width: 34rem;
        font-size: 1.05rem;
        font-weight: 400;
        line-height: 1.75;
        letter-spacing: -0.01em;
        color: var(--text-muted);
      }

      .lesson-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 16px;
        margin-top: 36px;
      }

      .lesson-link {
        display: block;
        padding: 22px 22px;
        border-radius: 22px;
        border: 1px solid var(--line-soft);
        background: rgba(255, 255, 255, 0.92);
        color: var(--text-main);
        text-decoration: none;
        box-shadow: 0 12px 24px rgba(70, 45, 28, 0.08);
        transition: transform 0.18s ease, box-shadow 0.18s ease,
          border-color 0.18s ease;
      }

      .lesson-link:hover {
        transform: translateY(-2px);
        box-shadow: 0 16px 28px rgba(70, 45, 28, 0.12);
        border-color: rgba(217, 108, 61, 0.28);
      }

      .lesson-number {
        display: block;
        margin-bottom: 8px;
        color: var(--accent);
        font-size: 0.9rem;
        font-weight: 700;
        letter-spacing: 0.02em;
      }

      .lesson-name {
        display: block;
        font-size: 1.25rem;
        font-weight: 700;
        letter-spacing: -0.02em;
      }

      @media (max-width: 640px) {
        main {
          padding: 42px 22px;
        }

        .lesson-grid {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <div class="eyebrow">Korean Learning</div>
      <h1>환영합니다</h1>
      <p>
        이곳은 한국어를 쉽고 즐겁게 배우기 위한 학습 페이지입니다.
        천천히 읽고, 따라 쓰고, 자주 말하면서 한국어와 더 가까워져 보세요.
      </p>
      <div class="lesson-grid">
        <a class="lesson-link" href="c1/">
          <span class="lesson-number">1과</span>
          <span class="lesson-name">c1</span>
        </a>
        <a class="lesson-link" href="c2/">
          <span class="lesson-number">2과</span>
          <span class="lesson-name">c2</span>
        </a>
        <a class="lesson-link" href="c3/">
          <span class="lesson-number">3과</span>
          <span class="lesson-name">c3</span>
        </a>
        <a class="lesson-link" href="c4/">
          <span class="lesson-number">4과</span>
          <span class="lesson-name">c4</span>
        </a>
      </div>
    </main>
  </body>
</html>
