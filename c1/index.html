<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>1과 - 문장 구성 및 호응 연습</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <style>
      :root {
        color-scheme: light;
        --bg-start: #f7fbff;
        --bg-end: #fff5ee;
        --panel: rgba(255, 255, 255, 0.95);
        --line: rgba(28, 37, 50, 0.08);
        --text-main: #1f2937;
        --text-muted: #677483;
        --accent: #e46a3a;
        --accent-strong: #203247;
        --accent-soft: #edf4fb;
        --success: #1f8f5f;
        --danger: #cb4f4f;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        padding: 18px;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR",
          sans-serif;
        color: var(--text-main);
        background:
          radial-gradient(circle at top left, rgba(255, 255, 255, 0.96), transparent 30%),
          linear-gradient(135deg, var(--bg-start), var(--bg-end));
      }

      .shell {
        width: min(1080px, 100%);
        margin: 0 auto;
        padding: 24px;
        border-radius: 28px;
        background: rgba(255, 255, 255, 0.7);
        border: 1px solid rgba(255, 255, 255, 0.8);
        box-shadow: 0 20px 56px rgba(34, 45, 63, 0.1);
        backdrop-filter: blur(12px);
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        gap: 16px;
        align-items: center;
        margin-bottom: 18px;
      }

      .topbar a {
        color: var(--accent);
        text-decoration: none;
        font-weight: 700;
      }

      .eyebrow {
        display: inline-flex;
        padding: 7px 12px;
        border-radius: 999px;
        background: rgba(228, 106, 58, 0.12);
        color: var(--accent);
        font-size: 0.74rem;
        font-weight: 800;
        letter-spacing: 0.1em;
        text-transform: uppercase;
      }

      h1 {
        margin: 10px 0 0;
        font-size: clamp(1.7rem, 4vw, 2.4rem);
        letter-spacing: -0.05em;
        line-height: 1.05;
      }

      .workspace,
      .panel,
      .sample-box,
      .result-box {
        background: var(--panel);
        border: 1px solid var(--line);
        border-radius: 24px;
        box-shadow: 0 14px 34px rgba(34, 45, 63, 0.06);
      }

      .tabs {
        display: flex;
        gap: 10px;
        margin: 14px 0 12px;
      }

      .sample-box {
        margin-top: 14px;
        padding: 14px;
      }

      .sample-box h2 {
        margin: 0 0 10px;
        font-size: 0.95rem;
        color: var(--text-muted);
      }

      .sample-flow {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 12px;
        align-items: end;
      }

      .sample-slot {
        min-width: 92px;
      }

      .sample-slot-label {
        display: inline-flex;
        margin-bottom: 6px;
        padding: 5px 8px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: 0.7rem;
        font-weight: 800;
      }

      .sample-slot-value {
        min-height: 38px;
        padding: 7px 0;
        border-bottom: 2px solid #d4dde7;
        color: #9aa7b3;
        font-weight: 700;
      }

      .sample-slot-value.filled {
        color: var(--accent-strong);
        border-color: rgba(32, 50, 71, 0.34);
      }

      .sample-particle,
      .sample-predicate {
        padding-bottom: 7px;
        font-weight: 700;
        color: var(--accent-strong);
      }

      .tab-button {
        border: 0;
        border-radius: 999px;
        padding: 12px 16px;
        font: inherit;
        font-weight: 700;
        background: rgba(255, 255, 255, 0.8);
        color: var(--text-muted);
        cursor: pointer;
        border: 1px solid var(--line);
      }

      .tab-button.active {
        background: var(--accent-strong);
        color: white;
        border-color: var(--accent-strong);
        box-shadow: 0 10px 24px rgba(32, 50, 71, 0.16);
      }

      .workspace {
        padding: 14px;
      }

      .workspace-grid {
        display: grid;
        grid-template-columns: minmax(220px, 280px) minmax(0, 1fr);
        gap: 16px;
      }

      .panel {
        padding: 14px;
      }

      .panel h2 {
        margin: 0 0 10px;
        font-size: 0.92rem;
        letter-spacing: -0.03em;
        color: var(--text-muted);
      }

      .item-list {
        display: grid;
        gap: 8px;
      }

      .item-button {
        width: 100%;
        text-align: left;
        border: 1px solid #dce5ee;
        background: white;
        border-radius: 16px;
        padding: 12px 14px;
        font: inherit;
        cursor: pointer;
        transition: transform 0.18s ease, border-color 0.18s ease,
          box-shadow 0.18s ease;
      }

      .item-button strong {
        display: block;
        margin-bottom: 4px;
        font-size: 0.98rem;
      }

      .item-button span {
        color: var(--text-muted);
        font-size: 0.88rem;
        line-height: 1.45;
      }

      .item-button.active {
        border-color: rgba(41, 67, 92, 0.32);
        background: #f7fbff;
        box-shadow: 0 8px 18px rgba(41, 67, 92, 0.08);
        transform: translateY(-1px);
      }

      .sentence-box {
        padding: 16px;
        border-radius: 20px;
        background: linear-gradient(180deg, rgba(255, 255, 255, 0.99), #fff9f5);
        border: 1px solid var(--line);
      }

      .sentence-box h3 {
        margin: 0 0 4px;
        font-size: 1.14rem;
      }

      .meaning {
        color: var(--text-muted);
        line-height: 1.5;
        font-size: 0.86rem;
      }

      .sentence-preview {
        display: flex;
        flex-wrap: wrap;
        gap: 10px 14px;
        align-items: end;
        margin-top: 16px;
        padding-top: 4px;
      }

      .slot {
        min-width: 104px;
      }

      .slot-label {
        display: inline-flex;
        margin-bottom: 6px;
        padding: 5px 9px;
        border-radius: 999px;
        background: var(--accent-soft);
        color: var(--accent-strong);
        font-size: 0.72rem;
        font-weight: 800;
      }

      .slot-value {
        min-height: 42px;
        padding: 8px 0;
        border-bottom: 2px solid #d4dde7;
        font-size: 1.02rem;
        font-weight: 700;
      }

      .slot-value.correct {
        border-color: rgba(31, 143, 95, 0.4);
        color: var(--success);
      }

      .slot-value.incorrect {
        border-color: rgba(203, 79, 79, 0.35);
        color: var(--danger);
      }

      .particle,
      .predicate {
        padding-bottom: 8px;
        font-size: 1.02rem;
        font-weight: 700;
        color: var(--accent-strong);
      }

      .choice-groups {
        display: grid;
        gap: 12px;
        margin-top: 12px;
      }

      .choice-group {
        padding: 14px;
        border-radius: 18px;
        background: #f8fafc;
        border: 1px solid #e4ebf2;
      }

      .choice-group.active {
        border-color: rgba(32, 50, 71, 0.18);
        background: #f5f9fd;
      }

      .choice-group h4 {
        margin: 0 0 10px;
        font-size: 0.96rem;
      }

      .choice-row {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }

      .choice-button {
        border: 1px solid #d9e1ea;
        border-radius: 999px;
        background: white;
        color: #435160;
        padding: 9px 12px;
        font: inherit;
        font-size: 0.94rem;
        font-weight: 600;
        cursor: pointer;
      }

      .choice-button.selected {
        background: #203247;
        border-color: #203247;
        color: white;
      }

      .result-box {
        margin-top: 14px;
        padding: 14px;
        display: none;
      }

      .result-box.show {
        display: block;
      }

      .result-box.success {
        background: rgba(31, 143, 95, 0.08);
        border-color: rgba(31, 143, 95, 0.16);
        color: var(--success);
      }

      .result-box.fail {
        background: rgba(203, 79, 79, 0.08);
        border-color: rgba(203, 79, 79, 0.16);
        color: var(--danger);
      }

      .result-summary {
        font-size: 1rem;
        font-weight: 800;
        line-height: 1.65;
      }

      .feedback-list {
        display: grid;
        gap: 10px;
        margin-top: 12px;
      }

      .feedback-item {
        padding: 12px 14px;
        border-radius: 16px;
        background: rgba(255, 255, 255, 0.74);
        border: 1px solid rgba(31, 36, 48, 0.08);
      }

      .feedback-item.correct {
        border-color: rgba(31, 143, 95, 0.18);
        background: rgba(31, 143, 95, 0.06);
      }

      .feedback-item.incorrect,
      .feedback-item.empty {
        border-color: rgba(203, 79, 79, 0.16);
        background: rgba(203, 79, 79, 0.05);
      }

      .feedback-top {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 6px;
        margin-bottom: 6px;
      }

      .feedback-role {
        display: inline-flex;
        padding: 6px 10px;
        border-radius: 999px;
        background: rgba(41, 67, 92, 0.1);
        color: var(--accent-strong);
        font-size: 0.78rem;
        font-weight: 800;
      }

      .feedback-badge {
        display: inline-flex;
        padding: 6px 10px;
        border-radius: 999px;
        font-size: 0.76rem;
        font-weight: 800;
        letter-spacing: 0.04em;
      }

      .feedback-badge.correct {
        background: rgba(31, 143, 95, 0.12);
        color: var(--success);
      }

      .feedback-badge.incorrect,
      .feedback-badge.empty {
        background: rgba(203, 79, 79, 0.12);
        color: var(--danger);
      }

      .feedback-text {
        color: #445261;
        line-height: 1.65;
        font-size: 0.95rem;
      }

      .feedback-text strong {
        color: var(--text-main);
      }

      .feedback-hint {
        margin-top: 6px;
        color: var(--text-muted);
        font-size: 0.88rem;
        line-height: 1.55;
      }

      .action-row {
        display: flex;
        justify-content: flex-end;
        gap: 12px;
        margin-top: 12px;
      }

      .action-row button,
      .action-row a {
        min-height: 46px;
        border-radius: 999px;
        padding: 0 16px;
        font: inherit;
        font-weight: 700;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }

      .primary-action {
        border: 0;
        background: var(--accent);
        color: white;
        cursor: pointer;
        box-shadow: 0 12px 24px rgba(228, 106, 58, 0.2);
      }

      .secondary-action {
        background: white;
        color: var(--accent-strong);
        border: 1px solid var(--line);
      }

      @media (max-width: 920px) {
        .workspace-grid {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 640px) {
        body {
          padding: 10px;
        }

        .shell {
          padding: 16px;
        }

        .topbar,
        .action-row,
        .tabs {
          flex-direction: column;
          align-items: stretch;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <div class="topbar">
        <div class="eyebrow">Lesson 1</div>
        <a href="../index.html">메인으로 돌아가기</a>
      </div>

      <h1>문장 구성 및 호응 연습</h1>

      <section class="sample-box">
        <h2>맛보기 문제</h2>
        <div class="sample-flow">
          <div class="sample-slot">
            <div class="sample-slot-label">주어</div>
            <div class="sample-slot-value" data-sample-slot="0">(선택)</div>
          </div>
          <div class="sample-particle">은/는</div>
          <div class="sample-slot">
            <div class="sample-slot-label">목적어</div>
            <div class="sample-slot-value" data-sample-slot="1">(선택)</div>
          </div>
          <div class="sample-particle">을/를</div>
          <div class="sample-slot">
            <div class="sample-slot-label">필수 부사어</div>
            <div class="sample-slot-value" data-sample-slot="2">(선택)</div>
          </div>
          <div class="sample-particle">(으)로</div>
          <div class="sample-predicate">여기다</div>
        </div>
      </section>

      <div class="tabs">
        <button class="tab-button active" data-tab="verbs">서술어 중심 연습</button>
        <button class="tab-button" data-tab="vocabs">상징어·어휘 호응 연습</button>
      </div>

      <section class="workspace">
        <div class="workspace-grid">
          <aside class="panel">
            <h2>대상 선택</h2>
            <div class="item-list" id="item-list"></div>
          </aside>

          <div class="panel">
            <div class="sentence-box">
              <h3 id="item-title"></h3>
              <p class="meaning" id="item-meaning"></p>
              <div class="sentence-preview" id="sentence-preview"></div>
            </div>

            <div class="choice-groups" id="choice-groups"></div>

            <div class="result-box" id="result-box"></div>

            <div class="action-row">
              <button class="primary-action" id="check-button">문장 확인하기</button>
              <button class="secondary-action" id="reset-button">다시 고르기</button>
            </div>
          </div>
        </div>
      </section>
    </div>

    <script>
      const verbData = [
        {
          id: "v1",
          title: "닮다",
          meaning: "어떤 사물이나 사람의 모양, 성격 따위가 비슷하다.",
          format: [
            { type: "arg", index: 0 },
            { type: "arg", index: 1 },
            { type: "text", text: "닮다" },
          ],
          structure: [
            {
              role: "주어",
              particle: "이/가",
              options: ["현상", "자녀", "외모", "정책", "성격"],
              valid: ["자녀", "외모", "성격"],
            },
            {
              role: "필수 부사어",
              particle: "와/과",
              options: ["부모님", "가치관", "아버지", "발전", "친구"],
              valid: ["부모님", "아버지", "친구"],
            },
          ],
        },
        {
          id: "v2",
          title: "참가하다",
          meaning: "모임이나 단체, 일 따위에 관계하여 들어가다.",
          format: [
            { type: "arg", index: 0 },
            { type: "arg", index: 1 },
            { type: "text", text: "참가하다" },
          ],
          structure: [
            {
              role: "주어",
              particle: "이/가",
              options: ["전문가", "가치관", "선수단", "규칙", "시민들"],
              valid: ["전문가", "선수단", "시민들"],
            },
            {
              role: "필수 부사어",
              particle: "에",
              options: ["국제대회", "해결책", "토론회", "문제점", "캠페인"],
              valid: ["국제대회", "토론회", "캠페인"],
            },
          ],
        },
        {
          id: "v3",
          title: "여기다",
          meaning: "마음속으로 그러하다고 인정하거나 생각하다.",
          format: [
            { type: "arg", index: 0 },
            { type: "arg", index: 1 },
            { type: "arg", index: 2 },
            { type: "text", text: "여기다" },
          ],
          structure: [
            {
              role: "주어",
              particle: "은/는",
              options: ["정부", "자연", "전문가들", "갈등", "우리"],
              valid: ["정부", "전문가들", "우리"],
            },
            {
              role: "목적어",
              particle: "을/를",
              options: ["실패", "과일", "이번 위기", "제도", "환경문제"],
              valid: ["실패", "이번 위기", "환경문제"],
            },
            {
              role: "필수 부사어",
              particle: "(으)로",
              options: ["무의미", "새로운 기회", "원인", "불가피", "도약의 발판"],
              valid: ["새로운 기회", "원인", "도약의 발판"],
            },
          ],
        },
        {
          id: "v4",
          title: "주다",
          meaning: "어떤 영향을 미치거나 남에게 건네어 가지게 하다.",
          format: [
            { type: "arg", index: 0 },
            { type: "arg", index: 1 },
            { type: "arg", index: 2 },
            { type: "text", text: "주다" },
          ],
          structure: [
            {
              role: "주어",
              particle: "이/가",
              options: ["책상", "정부 정책", "자원봉사자", "하늘", "긍정적 변화"],
              valid: ["정부 정책", "자원봉사자", "긍정적 변화"],
            },
            {
              role: "필수 부사어",
              particle: "에게/에",
              options: ["소외계층", "기억", "사회 전체", "목적", "피해자"],
              valid: ["소외계층", "사회 전체", "피해자"],
            },
            {
              role: "목적어",
              particle: "을/를",
              options: ["큰 도움", "감정", "실질적 혜택", "걸음", "악영향"],
              valid: ["큰 도움", "실질적 혜택", "악영향"],
            },
          ],
        },
      ];

      const vocabData = [
        {
          id: "voc1",
          title: "반짝반짝",
          meaning: "작은 빛이 잠깐 잇따라 나타났다가 사라지는 모양",
          format: [
            { type: "arg", index: 0 },
            { type: "text", text: "반짝반짝" },
            { type: "arg", index: 1 },
          ],
          structure: [
            {
              role: "주어",
              particle: "이/가",
              options: ["밤하늘의 별", "나무", "보석", "책상", "아이의 눈망울"],
              valid: ["밤하늘의 별", "보석", "아이의 눈망울"],
            },
            {
              role: "서술어",
              particle: "",
              options: ["뛰다", "빛나다", "자라다", "소리치다", "어둡다"],
              valid: ["빛나다"],
            },
          ],
        },
        {
          id: "voc2",
          title: "두근두근",
          meaning: "몹시 놀라거나 불안하여 가슴이 자꾸 뛰는 소리나 모양",
          format: [
            { type: "arg", index: 0 },
            { type: "text", text: "두근두근" },
            { type: "arg", index: 1 },
          ],
          structure: [
            {
              role: "주어",
              particle: "이/가",
              options: ["심장", "발걸음", "가슴", "머리", "마음"],
              valid: ["심장", "가슴", "마음"],
            },
            {
              role: "서술어",
              particle: "",
              options: ["뛰다", "빛나다", "거리다", "자라다", "아프다"],
              valid: ["뛰다", "거리다"],
            },
          ],
        },
        {
          id: "voc3",
          title: "무럭무럭",
          meaning: "아이들이나 동식물이 잘 자라는 모양",
          format: [
            { type: "arg", index: 0 },
            { type: "text", text: "무럭무럭" },
            { type: "arg", index: 1 },
          ],
          structure: [
            {
              role: "주어",
              particle: "이/가",
              options: ["아이", "생각", "나무", "건물", "새싹"],
              valid: ["아이", "나무", "새싹"],
            },
            {
              role: "서술어",
              particle: "",
              options: ["크다", "빛나다", "자라다", "소리치다", "뛰다"],
              valid: ["크다", "자라다"],
            },
          ],
        },
        {
          id: "voc4",
          title: "고래고래",
          meaning: "매우 크고 높은 목소리로 잇따라 소리를 지르는 모양",
          format: [
            { type: "arg", index: 0 },
            { type: "text", text: "고래고래" },
            { type: "arg", index: 1 },
          ],
          structure: [
            {
              role: "주어",
              particle: "이/가",
              options: ["제도", "취객", "군중", "구름", "화가 난 사람"],
              valid: ["취객", "군중", "화가 난 사람"],
            },
            {
              role: "서술어",
              particle: "",
              options: ["소리치다", "속삭이다", "소리지르다", "부르다", "울다"],
              valid: ["소리치다", "소리지르다"],
            },
          ],
        },
      ];

      const datasets = { verbs: verbData, vocabs: vocabData };
      let activeTab = "verbs";
      let selectedId = datasets[activeTab][0].id;
      let answers = {};
      let results = null;

      const itemList = document.getElementById("item-list");
      const itemTitle = document.getElementById("item-title");
      const itemMeaning = document.getElementById("item-meaning");
      const sentencePreview = document.getElementById("sentence-preview");
      const choiceGroups = document.getElementById("choice-groups");
      const resultBox = document.getElementById("result-box");
      const checkButton = document.getElementById("check-button");
      const resetButton = document.getElementById("reset-button");
      const tabButtons = Array.from(document.querySelectorAll(".tab-button"));
      const sampleSlots = Array.from(document.querySelectorAll("[data-sample-slot]"));

      function playSample() {
        const sampleWords = ["전문가들", "이번 위기", "새로운 기회"];
        sampleSlots.forEach((slot) => {
          slot.textContent = "(선택)";
          slot.classList.remove("filled");
        });
        sampleWords.forEach((word, index) => {
          window.setTimeout(() => {
            if (!sampleSlots[index]) return;
            sampleSlots[index].textContent = word;
            sampleSlots[index].classList.add("filled");
          }, 500 * (index + 1));
        });
      }

      function currentItem() {
        return datasets[activeTab].find((item) => item.id === selectedId);
      }

      function resetState() {
        answers = {};
        results = null;
      }

      function setTab(tab) {
        activeTab = tab;
        selectedId = datasets[activeTab][0].id;
        resetState();
        render();
      }

      function setItem(id) {
        selectedId = id;
        resetState();
        render();
      }

      function setAnswer(index, option) {
        answers[index] = option;
        results = null;
        render();
      }

      function checkAnswers() {
        const item = currentItem();
        const nextResults = {};
        let allCorrect = true;

        item.structure.forEach((arg, index) => {
          const value = answers[index];
          if (!value) {
            nextResults[index] = "empty";
            allCorrect = false;
          } else if (arg.valid.includes(value)) {
            nextResults[index] = "correct";
          } else {
            nextResults[index] = "incorrect";
            allCorrect = false;
          }
        });

        results = nextResults;
        resultBox.className =
          "result-box show " + (allCorrect ? "success" : "fail");
        resultBox.innerHTML = buildFeedback(item, nextResults, allCorrect);
        render();
      }

      function feedbackStatusLabel(status) {
        if (status === "correct") return "자연스러움";
        if (status === "empty") return "미선택";
        return "다시 보기";
      }

      function buildFeedback(item, nextResults, allCorrect) {
        const summary = allCorrect
          ? "완벽합니다. 모든 논항과 호응이 자연스럽게 연결되었습니다."
          : "자리별 피드백을 확인하고 어색한 연결을 다시 골라 보세요.";

        const details = item.structure
          .map((arg, index) => {
            const status = nextResults[index];
            const selected = answers[index];
            let feedbackText = "";
            let hintText = "";

            if (status === "correct") {
              feedbackText =
                "<strong>" +
                (selected || "") +
                "</strong> 선택은 이 자리에서 자연스럽게 쓰일 수 있습니다.";
              hintText =
                "이 자리에서 가능한 다른 자연스러운 예: " +
                arg.valid.join(", ");
            } else if (status === "empty") {
              feedbackText =
                "아직 단어를 고르지 않았습니다. 이 자리는 <strong>" +
                arg.role +
                "</strong>을(를) 채워야 문장이 완성됩니다.";
              hintText =
                "먼저 살펴볼 만한 자연스러운 예: " + arg.valid.join(", ");
            } else {
              feedbackText =
                "<strong>" +
                selected +
                "</strong> 선택은 이 자리의 의미나 호응과 잘 맞지 않습니다.";
              hintText =
                "더 자연스러운 선택 예: " + arg.valid.join(", ");
            }

            return (
              '<div class="feedback-item ' +
              status +
              '">' +
              '<div class="feedback-top">' +
              '<span class="feedback-role">' +
              arg.role +
              (arg.particle ? " " + arg.particle : "") +
              "</span>" +
              '<span class="feedback-badge ' +
              status +
              '">' +
              feedbackStatusLabel(status) +
              "</span>" +
              "</div>" +
              '<div class="feedback-text">' +
              feedbackText +
              "</div>" +
              '<div class="feedback-hint">' +
              hintText +
              "</div>" +
              "</div>"
            );
          })
          .join("");

        return (
          '<div class="result-summary">' +
          summary +
          "</div>" +
          '<div class="feedback-list">' +
          details +
          "</div>"
        );
      }

      function renderList() {
        itemList.innerHTML = "";

        datasets[activeTab].forEach((item) => {
          const button = document.createElement("button");
          button.className =
            "item-button" + (item.id === selectedId ? " active" : "");
          button.type = "button";
          button.innerHTML =
            "<strong>" +
            item.title +
            "</strong><span>" +
            item.meaning +
            "</span>";
          button.addEventListener("click", () => setItem(item.id));
          itemList.appendChild(button);
        });
      }

      function renderSentence() {
        const item = currentItem();
        itemTitle.textContent = item.title;
        itemMeaning.textContent = item.meaning;
        sentencePreview.innerHTML = "";

        item.format.forEach((part) => {
          if (part.type === "text") {
            const predicate = document.createElement("div");
            predicate.className = "predicate";
            predicate.textContent = part.text;
            sentencePreview.appendChild(predicate);
            return;
          }

          const arg = item.structure[part.index];
          const slot = document.createElement("div");
          slot.className = "slot";

          const label = document.createElement("div");
          label.className = "slot-label";
          label.textContent = arg.role;
          slot.appendChild(label);

          const value = document.createElement("div");
          const resultClass = results && results[part.index]
            ? " " + results[part.index]
            : "";
          value.className = "slot-value" + resultClass;
          value.textContent = answers[part.index] || "(선택)";
          slot.appendChild(value);
          sentencePreview.appendChild(slot);

          if (arg.particle) {
            const particle = document.createElement("div");
            particle.className = "particle";
            particle.textContent = arg.particle;
            sentencePreview.appendChild(particle);
          }
        });
      }

      function renderChoices() {
        const item = currentItem();
        choiceGroups.innerHTML = "";

        item.structure.forEach((arg, index) => {
          const group = document.createElement("section");
          group.className =
            "choice-group" + (!answers[index] ? " active" : "");

          const title = document.createElement("h4");
          title.textContent = arg.role + "에 들어갈 말을 고르세요";
          group.appendChild(title);

          const row = document.createElement("div");
          row.className = "choice-row";

          arg.options.forEach((option) => {
            const button = document.createElement("button");
            button.type = "button";
            button.className =
              "choice-button" + (answers[index] === option ? " selected" : "");
            button.textContent = option;
            button.addEventListener("click", () => setAnswer(index, option));
            row.appendChild(button);
          });

          group.appendChild(row);
          choiceGroups.appendChild(group);
        });
      }

      function renderTabs() {
        tabButtons.forEach((button) => {
          button.classList.toggle("active", button.dataset.tab === activeTab);
        });
      }

      function render() {
        renderTabs();
        renderList();
        renderSentence();
        renderChoices();

        if (!results) {
          resultBox.className = "result-box";
          resultBox.innerHTML = "";
        }
      }

      tabButtons.forEach((button) => {
        button.addEventListener("click", () => setTab(button.dataset.tab));
      });

      checkButton.addEventListener("click", checkAnswers);
      resetButton.addEventListener("click", () => {
        resetState();
        render();
      });

      render();
      playSample();
      window.setInterval(playSample, 3600);
    </script>
  </body>
</html>
