<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>3과 읽기</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard/dist/web/static/pretendard.css"
    />
    <style>
      @keyframes strongPulse {
        0% {
          transform: scale(0.97);
          opacity: 0.82;
        }

        100% {
          transform: scale(1.18);
          opacity: 0;
        }
      }

      @keyframes lift {
        0%,
        100% {
          transform: translateY(0);
        }

        50% {
          transform: translateY(-3px);
        }
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 24px;
        font-family: "Pretendard", "Apple SD Gothic Neo", "Noto Sans KR", sans-serif;
        background: linear-gradient(135deg, #eff8ff, #fff2e9);
        color: #1b2432;
      }
      main {
        width: min(760px, 100%);
        padding: 40px 28px;
        border-radius: 28px;
        background: rgba(255,255,255,0.9);
        border: 1px solid rgba(27,36,50,0.08);
        box-shadow: 0 18px 48px rgba(33,49,70,0.1);
      }
      h1 { margin: 0 0 12px; font-size: 2.2rem; }
      p { margin: 0; color: #637180; line-height: 1.75; }
      p + p { margin-top: 14px; }
      a { color: #e26635; text-decoration: none; font-weight: 700; }
      .focus-link {
        position: relative;
        display: inline-flex;
        margin-top: 18px;
        min-height: 52px;
        padding: 0 20px;
        border-radius: 999px;
        align-items: center;
        justify-content: center;
        background: #e26635;
        color: white;
        box-shadow: 0 18px 34px rgba(226, 102, 53, 0.26);
        animation: lift 1.4s ease-in-out infinite;
      }
      .focus-link::before,
      .focus-link::after {
        content: "";
        position: absolute;
        inset: -10px;
        border-radius: 999px;
        border: 3px solid rgba(226, 102, 53, 0.3);
        animation: strongPulse 1.85s ease-out infinite;
      }
      .focus-link::after { animation-delay: 0.92s; }
    </style>
  </head>
  <body>
    <main>
      <h1>3과 읽기</h1>
      <p>이 페이지는 짧은 지문, 핵심 어휘 표시, 내용 이해 질문이 들어갈 자리입니다.</p>
      <p>추천 구성: 짧은 글 읽기, 문맥 속 어휘 찾기, 핵심 내용 선택.</p>
      <p><a class="focus-link" href="../index.html">3과 메뉴로 돌아가기</a></p>
    </main>
  </body>
</html>
